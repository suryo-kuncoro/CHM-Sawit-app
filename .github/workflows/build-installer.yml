name: Build CHM Sawit Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'

      - name: Setup Pandoc (dibutuhkan beberapa dependency R)
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system libs untuk sf / terra / lidR (via rtools sudah termasuk di runner)
        run: |
          echo "Menggunakan R Windows binary packages, tidak perlu compile dari source"

      - name: Install package dependencies aplikasi (rlas & lidR dicabut dari CRAN 2026-06-09, dipasang dari GitHub r-lidar)
        shell: Rscript {0}
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c("shiny", "terra", "sf", "remotes"))

          # rlas & lidR dicabut dari CRAN (rlas: masalah ASAN; lidR: bergantung ke rlas).
          # Keduanya masih aktif dikembangkan di GitHub, jadi dipasang dari sana.
          remotes::install_github("r-lidar/rlas", upgrade = "never")
          remotes::install_github("r-lidar/lidR", upgrade = "never")

          pkgs <- c("shiny", "terra", "lidR", "sf", "rlas")
          missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]
          if (length(missing) > 0) {
            stop(
              "Package berikut GAGAL terpasang setelah dicoba: ",
              paste(missing, collapse = ", "),
              ". Cek log di atas untuk pesan error yang spesifik."
            )
          }

          cat("\nSemua package berhasil terpasang:\n")
          print(sapply(pkgs, function(p) as.character(packageVersion(p))))

      - name: Jalankan build installer
        shell: Rscript {0}
        run: source("build_installer.R")

      - name: Upload installer sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: CHM-Sawit-Installer
          path: build_installer/*.exe
          if-no-files-found: error
